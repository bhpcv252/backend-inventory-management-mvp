services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockflow
      POSTGRES_PASSWORD: stockflow
      POSTGRES_DB: stockflow_db
    ports:
      - '5435:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stockflow -d stockflow_db']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: production
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy # wait for postgres to be ready
    env_file:
      - .env.docker

volumes:
  pgdata:
